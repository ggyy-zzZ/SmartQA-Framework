# 仅 Qdrant（向量库）。Neo4j、MySQL 由本机自行启动，勿与本 compose 重复占端口。
# Neo4j 示例：D:\Tools\neo\neo4j-chs-community-2026.03.1-windows\bin\neo4j.bat console
# MySQL：本机 3306，库 assistant，首次可执行 data/sql/mysql/assistant_bootstrap.sql
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: demo-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - demo-qdrant-data:/qdrant/storage

  # === Kafka 依赖 ===
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: demo-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: demo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - demo-kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: demo-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

volumes:
  demo-qdrant-data:
  demo-kafka-data:
