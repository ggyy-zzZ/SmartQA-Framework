spring.application.name=demo
server.port=8080

# File upload size limit (increased for CSV batch learning)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# QA assistant config
# 助手在 LLM system 提示中的称谓（勿写死为某一商业产品名）
qa.assistant.assistant-name=知识库问答助手
# 规划：单次可接入的结构化数据行数上限（后续可在入库流水线校验）
qa.assistant.max-structured-ingest-rows=10000
qa.assistant.docs-dir=D:/project/ai/demo/data/knowledge/enterprise_mysql_compiled.txt
qa.assistant.model=MiniMax-M2.7
qa.assistant.api-url=https://api.minimaxi.com/v1/text/chatcompletion_v2
# 勿提交真实密钥；本地在环境变量 MINIMAX_API_KEY 或 application-local.properties 中配置
qa.assistant.api-key=${MINIMAX_API_KEY:}
qa.assistant.retrieval-top-k=6
qa.assistant.vector-enabled=true
qa.assistant.qdrant-url=http://localhost:6333
# 百炼 text-embedding-v4 使用 1024 维；与旧 hash(768) 集合不兼容，默认新集合名，灌库需 --recreate
qa.assistant.qdrant-collection=enterprise_knowledge_v2
qa.assistant.qdrant-active-learning-collection=enterprise_active_learning_v2
qa.assistant.vector-top-k=6
qa.assistant.vector-embedding-dim=1024
# 向量化：dashscope=百炼；无 DASHSCOPE_API_KEY 时自动降级 hash
qa.assistant.embedding-provider=dashscope
qa.assistant.dashscope-api-key=${DASHSCOPE_API_KEY:}
qa.assistant.embedding-model=text-embedding-v4
qa.assistant.embedding-api-url=https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding
qa.assistant.embedding-batch-size=10
qa.assistant.embedding-timeout-ms=30000
# P0：企业问答统一多路召回 + 重排（不依赖单一 intent 通路）
qa.assistant.unified-retrieval-enabled=true
qa.assistant.rerank-enabled=true
qa.assistant.rerank-model=gte-rerank-v2
qa.assistant.rerank-api-url=https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
qa.assistant.rerank-candidate-max=32
qa.assistant.recall-vector-top-k=12
qa.assistant.recall-graph-top-k=10
# 法人/任职列表类：图谱召回条数（避免只返回 top6）
qa.assistant.recall-graph-person-role-top-k=32
# 每问先调 MiniMax 做意图+实体抽取（无 MINIMAX_API_KEY 时走规则兜底）
qa.assistant.intent-llm-enabled=true
# 法人/任职/证照列表问句优先规则意图，不等待 MiniMax 意图接口（显著降低首包延迟）
qa.assistant.intent-rule-first-for-structured=true
# LLM 置信度>=该值且槽位齐备时不走规则 enrich（人名/queryType/roleFocus 等）
qa.assistant.intent-llm-enrich-min-confidence=0.72
qa.assistant.intent-llm-timeout-ms=45000
# 回答闸门（本地验证建议开启）
qa.assistant.answer-gate-enabled=true
qa.assistant.answer-gate-min-evidence-count=1
qa.assistant.answer-gate-min-top-score=3.0
qa.assistant.answer-gate-block-on-unknown-intent=true
qa.assistant.alignment-strict=false
qa.assistant.alignment-low-overlap-threshold=0.08
qa.assistant.mysql-enabled=true
# MySQL 连接与 schema 仅部署配置；提示词中不假设具体业务系统名。
# mysql-url 默认库名建议为 assistant（存放 qa_* 系统表与 bootstrap 示例）。
# 与 assistant 同实例的「业务库」如 tdcomp：勿改 mysql-schema 为 tdcomp（除非 qa_* 也在 tdcomp），
# 请用 POST /qa/mysql/connect，请求体 database=tdcomp，只读导出 information_schema 并可 assess/persist 写入主动学习。
qa.assistant.mysql-url=jdbc:mysql://localhost:3306/assistant?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&connectTimeout=5000&socketTimeout=15000
qa.assistant.mysql-username=${MYSQL_USERNAME:root}
qa.assistant.mysql-password=${MYSQL_PASSWORD:root}
qa.assistant.mysql-schema=assistant
qa.assistant.mysql-top-k=6
qa.assistant.mysql-per-table-limit=3
# 业务库配置（用于 supplemental table 查询，如员工表 tdcomp.employee）
qa.assistant.business-mysql-url=jdbc:mysql://localhost:3306/tdcomp?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&connectTimeout=5000&socketTimeout=15000
qa.assistant.business-mysql-username=root
qa.assistant.business-mysql-password=root
# 实体类型 → 表名映射（逗号分隔多表）
qa.assistant.entity-table-mapping.employee=employee
# 员工基础知识加载最大条数（0 表示不限制）
qa.assistant.employee-base-limit=50000
# 人员-角色预检用到的表物理名（与 information_schema / SQL 一致）
qa.assistant.mysql-person-role-employee-table=employee
qa.assistant.mysql-person-role-company-table=company
# 启动时对 qa.assistant.mysql-url 执行 Flyway（classpath:db/migration/assistant）
qa.assistant.flyway-enabled=true
# EKSP 增量同步（本地验证 MVP Sprint 2）
qa.assistant.knowledge-sync-domain=org_master
qa.assistant.knowledge-sync-default-since-hours=24
# 自动同步：true 后按 poll-interval 轮询业务库锚点表水位列，有变更才跑增量（watch-only=true）
qa.assistant.knowledge-sync-incremental-scheduled-enabled=false
qa.assistant.knowledge-sync-watermark-watch-only=true
qa.assistant.knowledge-sync-poll-interval-ms=60000
# tdcomp.company 更新时间为 modifytime（非 updated_at）
qa.assistant.knowledge-sync-watermark-column=modifytime

# ==================== CDC / Debezium 配置 ====================
# 是否启用 Debezium CDC（替代水位 Polling 方案）
qa.assistant.cdc-enabled=true
# Kafka 连接地址（docker-compose 中的 kafka:9092）
qa.assistant.cdc-kafka-bootstrap-servers=localhost:9092
# CDC Consumer Group ID
qa.assistant.cdc-kafka-group-id=demo-cdc-consumer
# Debezium 监听的数据库名
qa.assistant.cdc-database-include-list=tdcomp
# Debezium 监听的表名（逗号分隔）
# tdcomp 当前仅有 company/employee；branch/partner 无表时不订阅空 topic
qa.assistant.cdc-table-include-list=tdcomp.company,tdcomp.employee
# CDC 写入重试次数
qa.assistant.cdc-max-retries=3
# CDC 写入重试间隔（毫秒）
qa.assistant.cdc-retry-delay-ms=5000
# CDC 目标库写入并行度
qa.assistant.cdc-write-parallelism=4
# CDC 死信队列 Topic
qa.assistant.cdc-dlt-topic=cdc_dlt
# CDC 审计：MySQL 变更检测 + Neo4j/Qdrant 写入结果（JSONL）
qa.assistant.cdc-audit-log-enabled=false
qa.assistant.cdc-audit-log-path=data/qa_logs/cdc_sync.jsonl

# information_schema 目录导出：最多表数、Markdown 最大字符（超出硬截断）
qa.assistant.max-schema-export-tables=15
qa.assistant.max-schema-export-chars=250000
# schema 评估：送入模型的目录最大字符、模型回答最大字符
qa.assistant.max-schema-assessment-catalog-chars=24000
qa.assistant.max-schema-assessment-response-chars=6000
# 结构化清单定时门禁（默认关闭）；manifest 为 JSON，见 openspec/design/structured-ingest-gate.md
#qa.assistant.structured-ingest-schedule-enabled=false
#qa.assistant.structured-ingest-schedule-cron=0 0 2 * * ?
#qa.assistant.structured-ingest-manifest-path=
#qa.assistant.structured-ingest-job-log-path=

# Local graph database config (auth disabled by default in local Neo4j)
graph.neo4j.uri=bolt://localhost:7687
graph.neo4j.username=
graph.neo4j.password=

# 业务规则配置路径（所有特定业务的硬编码规则外置到此文件）
qa.business-rules.path=classpath:qa/business-rules.json

# 本地密钥（可选）：仓库根目录 application-local.properties（已在 .gitignore），覆盖 qa.assistant.api-key，不依赖 IDE/Cursor 环境变量
# JVM 时区设为上海
spring.jvm.timezone=Asia/Shanghai

spring.config.import=optional:file:./application-local.properties
