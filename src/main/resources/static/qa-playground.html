<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库助手</title>
    <style>
        :root {
            --bg: #070a14;
            --card: #0f172a;
            --card-2: #111b35;
            --primary: #00e5ff;
            --primary-2: #7c3aed;
            --primary-soft: rgba(0, 229, 255, 0.16);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --line: rgba(148, 163, 184, 0.24);
            --glow: 0 0 18px rgba(0, 229, 255, 0.25);
            --success: #34d399;
            --error: #fda4af;
        }
        body {
            margin: 0;
            background: linear-gradient(180deg, #06080f 0%, var(--bg) 100%);
            font-family: "Microsoft YaHei", Arial, sans-serif;
            color: var(--text);
            min-height: 100vh;
        }
        .wrap { max-width: 800px; margin: 0 auto; padding: 20px 16px 60px; }

        .header {
            text-align: center;
            padding: 30px 0 24px;
        }
        .header h1 {
            margin: 0 0 8px;
            font-size: 28px;
            color: #c4f8ff;
            text-shadow: 0 0 12px rgba(0, 229, 255, 0.35);
        }
        .header p { margin: 0; color: var(--muted); font-size: 14px; }

        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 28px rgba(2, 6, 23, 0.6), inset 0 0 0 1px rgba(56, 189, 248, 0.08);
            padding: 20px 24px;
            margin-bottom: 16px;
            border: 1px solid rgba(56, 189, 248, 0.16);
        }
        .card-title {
            font-size: 18px;
            color: #b7f6ff;
            font-weight: 600;
            margin: 0 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        textarea, input[type="text"], input[type="password"], input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid rgba(0, 229, 255, 0.22);
            padding: 12px 14px;
            font-size: 14px;
            background: #091125;
            color: #dbeafe;
            font-family: inherit;
        }
        textarea { min-height: 100px; resize: vertical; }
        textarea:focus, input:focus {
            outline: none;
            border-color: rgba(0, 229, 255, 0.55);
            box-shadow: var(--glow);
        }
        textarea::placeholder, input::placeholder { color: #475569; }

        .toolbar {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-2) 100%);
            color: #fff;
            padding: 12px 24px;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 0 14px rgba(124, 58, 237, 0.42);
            font-family: inherit;
            font-weight: 500;
        }
        button:hover { filter: brightness(1.06); }
        button:disabled { background: #475569; cursor: not-allowed; filter: none; box-shadow: none; }
        button.secondary {
            background: #1e293b;
            border: 1px solid rgba(148, 163, 184, 0.35);
            box-shadow: none;
            padding: 10px 16px;
        }
        button.secondary:hover { border-color: rgba(0, 229, 255, 0.45); }

        select {
            border-radius: 8px;
            border: 1px solid rgba(0, 229, 255, 0.28);
            background: #0b1228;
            color: #cbd5e1;
            padding: 8px 12px;
            font-size: 13px;
        }

        .status {
            font-size: 13px;
            color: var(--muted);
        }
        .status.ok { color: var(--success); }
        .status.error { color: var(--error); }

        .thinking-box {
            background: var(--card-2);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px 16px;
            min-height: 60px;
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
        }
        .thinking-item { padding: 2px 0; }
        .thinking-item::before { content: "• "; color: var(--primary); }

        .answer-box {
            background: var(--card-2);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
            min-height: 120px;
            line-height: 1.8;
            font-size: 15px;
            color: #e2e8f0;
        }
        .answer-box h1, .answer-box h2, .answer-box h3 { margin: 12px 0 8px; color: #b7f6ff; }
        .answer-box table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        .answer-box td, .answer-box th {
            border: 1px solid var(--line);
            padding: 8px 12px;
            text-align: left;
        }

        .result-section { margin-top: 16px; }
        .result-label {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .links {
            text-align: center;
            margin-top: 24px;
        }
        .links a {
            font-size: 12px;
            color: #7dd3fc;
            text-decoration: none;
            margin: 0 12px;
        }
        .links a:hover { text-decoration: underline; }

        .simple-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

        .learn-section {
            background: var(--card-2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .learn-section-title {
            font-size: 15px;
            color: #a5f3fc;
            margin-bottom: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="wrap">

    <div class="header">
        <h1>知识库助手</h1>
        <p>先学习，后提问，答案即刻呈现</p>
    </div>

    <!-- Section 1: Learn -->
    <div class="card">
        <div class="card-title"><span class="icon">📚</span>学习知识</div>

        <div class="learn-section">
            <div class="learn-section-title">粘贴文本学习</div>
            <input id="learnTextTitle" type="text" placeholder="标题（可选）">
            <textarea id="learnTextBody" style="margin-top:8px;" placeholder="粘贴要学习的内容..."></textarea>
            <div class="toolbar">
                <button id="learnTextBtn">保存</button>
                <span id="learnTextStatus" class="status"></span>
            </div>
        </div>

        <div class="learn-section">
            <div class="learn-section-title">多专家智能学习</div>
            <div class="simple-grid">
                <input id="expertHost" type="text" placeholder="主机" value="localhost">
                <input id="expertPort" type="number" placeholder="端口" value="3306">
            </div>
            <div class="simple-grid" style="margin-top:10px;">
                <input id="expertDb" type="text" placeholder="数据库名">
                <input id="expertUser" type="text" placeholder="用户名" value="root">
            </div>
            <div style="margin-top:10px;">
                <input id="expertPass" type="password" placeholder="密码" style="max-width:200px;">
            </div>
            <div class="toolbar">
                <button id="expertLearnBtn">一键智能学习</button>
                <span id="expertStatus" class="status"></span>
            </div>
            <p class="hint">系统自动分析表结构、检测关联、生成学习方案</p>
        </div>
    </div>

    <!-- Section 2: Ask -->
    <div class="card">
        <div class="card-title"><span class="icon">💬</span>提问</div>
        <textarea id="question" placeholder="输入你的问题..."></textarea>
        <div class="toolbar">
            <select id="scopeMode">
                <option value="enterprise" selected>企业知识库</option>
                <option value="personal">个人知识库</option>
            </select>
            <button id="askBtn">发送</button>
            <span id="statusText" class="status">就绪</span>
        </div>
    </div>

    <!-- Section 3: Result -->
    <div class="card">
        <div class="card-title"><span class="icon">✨</span>回答</div>

        <div class="result-section">
            <div class="result-label">思考过程</div>
            <div id="thinking" class="thinking-box">
                <div class="thinking-item" style="color:var(--muted);">等待提问...</div>
            </div>
        </div>

        <div class="result-section">
            <div class="result-label">回答</div>
            <div id="answer" class="answer-box"></div>
        </div>
    </div>

    <div class="links">
        <a href="/qa/assistant/runtime-summary" target="_blank">配置检查</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const questionEl = document.getElementById("question");
    const scopeModeEl = document.getElementById("scopeMode");
    const askBtnEl = document.getElementById("askBtn");
    const statusTextEl = document.getElementById("statusText");
    const thinkingEl = document.getElementById("thinking");
    const answerEl = document.getElementById("answer");

    const learnTextTitleEl = document.getElementById("learnTextTitle");
    const learnTextBodyEl = document.getElementById("learnTextBody");
    const learnTextBtnEl = document.getElementById("learnTextBtn");
    const learnTextStatusEl = document.getElementById("learnTextStatus");

    const expertHostEl = document.getElementById("expertHost");
    const expertPortEl = document.getElementById("expertPort");
    const expertDbEl = document.getElementById("expertDb");
    const expertUserEl = document.getElementById("expertUser");
    const expertPassEl = document.getElementById("expertPass");
    const expertLearnBtnEl = document.getElementById("expertLearnBtn");
    const expertStatusEl = document.getElementById("expertStatus");

    function escapeHtml(text) {
        return (text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderThinking(items) {
        if (!items || !items.length) {
            thinkingEl.innerHTML = '<div class="thinking-item" style="color:var(--muted);">等待提问...</div>';
            return;
        }
        thinkingEl.innerHTML = items.map(item => '<div class="thinking-item">' + escapeHtml(item.message || "") + '</div>').join("");
    }

    function renderAnswer(text) {
        const content = text || "";
        if (window.marked && typeof window.marked.parse === "function") {
            answerEl.innerHTML = window.marked.parse(content, {gfm: true, breaks: true});
        } else {
            answerEl.textContent = content;
        }
    }

    function clearResult() {
        thinkingEl.innerHTML = '<div class="thinking-item" style="color:var(--muted);">思考中...</div>';
        answerEl.innerHTML = "";
    }

    function setStatus(text) {
        statusTextEl.textContent = text;
        statusTextEl.className = text.includes("完成") ? "status ok" : (text.includes("失败") || text.includes("错误") ? "status error" : "status");
    }

    // Ask question
    askBtnEl.addEventListener("click", async () => {
        const question = questionEl.value.trim();
        const scope = scopeModeEl.value || "enterprise";
        if (!question) { alert("请输入问题"); return; }
        askBtnEl.disabled = true;
        clearResult();
        setStatus("思考中...");
        try {
            const resp = await fetch("/qa/ask", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({question, scope})
            });
            if (!resp.ok) throw new Error("HTTP " + resp.status);
            const data = await resp.json();

            if (data.thinking && data.thinking.length > 0) {
                renderThinking(data.thinking);
            }
            renderAnswer(data.answer || "无法回答这个问题");
            setStatus("完成");
        } catch (e) {
            thinkingEl.innerHTML = '<div class="thinking-item" style="color:var(--error);">错误：' + escapeHtml(e.message) + '</div>';
            answerEl.innerHTML = "";
            setStatus("失败");
        } finally {
            askBtnEl.disabled = false;
        }
    });

    // Learn text
    learnTextBtnEl.addEventListener("click", async () => {
        const content = (learnTextBodyEl.value || "").trim();
        const title = (learnTextTitleEl.value || "").trim() || "粘贴文本";
        const scope = scopeModeEl.value || "enterprise";
        if (!content) { alert("请输入内容"); return; }
        learnTextBtnEl.disabled = true;
        learnTextStatusEl.textContent = "保存中...";
        try {
            const resp = await fetch("/qa/learn/text", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({content, title, scope})
            });
            const data = await resp.json();
            const ok = !!data.ok;
            learnTextStatusEl.textContent = ok ? "已保存" : "失败";
            learnTextStatusEl.className = ok ? "status ok" : "status error";
        } catch (e) {
            learnTextStatusEl.textContent = e.message;
            learnTextStatusEl.className = "status error";
        } finally {
            learnTextBtnEl.disabled = false;
        }
    });

    // Multi-expert learning
    expertLearnBtnEl.addEventListener("click", async () => {
        const host = (expertHostEl.value || "").trim();
        const port = parseInt(String(expertPortEl.value || "3306"), 10) || 3306;
        const database = (expertDbEl.value || "").trim();
        const username = (expertUserEl.value || "").trim();
        const password = expertPassEl.value || "";
        const scope = scopeModeEl.value || "enterprise";

        if (!host || !database || !username) {
            alert("请填写主机、数据库名和用户名"); return;
        }
        expertLearnBtnEl.disabled = true;
        expertStatusEl.textContent = "智能学习中...";
        expertStatusEl.className = "status";
        setStatus("学习中...");
        clearResult();
        try {
            const resp = await fetch("/qa/learning/multi-expert", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({host, port, database, username, password, scope})
            });
            const data = await resp.json();
            if (data.ok) {
                expertStatusEl.textContent = "完成(" + (data.taskCount || 0) + "个任务)";
                expertStatusEl.className = "status ok";
                setStatus("完成");

                let summary = "### 学习完成\n\n";
                if (data.tableProfiles && data.tableProfiles.length > 0) {
                    summary += "已分析 " + data.tableProfiles.length + " 个数据表\n\n";
                    for (const p of data.tableProfiles) {
                        summary += "- " + p.tableName + " (" + p.businessType + ")\n";
                    }
                }
                if (data.learningTasks && data.learningTasks.length > 0) {
                    summary += "\n生成 " + data.learningTasks.length + " 个学习任务\n";
                }
                renderThinking([{message: "智能分析完成，准备就绪"}]);
                renderAnswer(summary || "学习完成");
            } else {
                expertStatusEl.textContent = "失败";
                expertStatusEl.className = "status error";
                setStatus("失败");
                renderThinking([{message: "学习失败：" + data.message}]);
            }
        } catch (e) {
            expertStatusEl.textContent = e.message;
            expertStatusEl.className = "status error";
            setStatus("失败");
            renderThinking([{message: "错误：" + e.message}]);
        } finally {
            expertLearnBtnEl.disabled = false;
        }
    });
</script>
</body>
</html>
