<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业智能助手</title>
    <style>
        :root {
            --bg: #0c0f1a;
            --bg-accent: #12182b;
            --surface: rgba(22, 28, 48, 0.92);
            --surface-2: rgba(15, 20, 38, 0.85);
            --border: rgba(148, 163, 184, 0.12);
            --border-focus: rgba(129, 140, 248, 0.55);
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --success: #4ade80;
            --error: #fb7185;
            --radius: 14px;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            --user-msg-bg: linear-gradient(135deg, var(--primary-dark), var(--primary));
            --assistant-bg: var(--surface);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.22), transparent),
                radial-gradient(ellipse 60% 40% at 100% 50%, rgba(56, 189, 248, 0.08), transparent),
                var(--bg);
        }
        .wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 20px 48px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header.hero {
            text-align: center;
            padding: 20px 0 16px;
            flex-shrink: 0;
        }
        .hero-orb {
            width: 44px;
            height: 44px;
            margin: 0 auto 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            box-shadow: 0 0 30px rgba(129, 140, 248, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .hero h1 {
            margin: 0 0 6px;
            font-size: 22px;
            font-weight: 600;
        }
        .hero p {
            margin: 0;
            font-size: 13px;
            color: var(--muted);
        }

        /* 聊天容器 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.2);
            border-radius: 3px;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .message-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
            padding: 0 4px;
        }
        .message.user .message-label {
            text-align: right;
        }
        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
        }
        .message.user .message-bubble {
            background: var(--user-msg-bg);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-bubble {
            background: var(--assistant-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* 思考过程（可折叠） */
        .thinking-toggle {
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .thinking-toggle:hover {
            color: var(--accent);
        }
        .thinking-toggle::before {
            content: "▸";
            transition: transform 0.2s;
        }
        .thinking-toggle.open::before {
            transform: rotate(90deg);
        }
        .thinking-content {
            display: none;
            padding: 10px 0;
        }
        .thinking-content.open {
            display: block;
        }
        .thinking-inner {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.6;
            max-height: 320px;
            overflow-y: auto;
            color: #cbd5e1;
        }
        .thinking-inner::-webkit-scrollbar {
            width: 4px;
        }
        .thinking-inner::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.2);
            border-radius: 2px;
        }
        .thinking-section {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(148, 163, 184, 0.1);
        }
        .thinking-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .thinking-section-title {
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 6px;
        }
        .thinking-line {
            color: #cbd5e1;
            margin-bottom: 3px;
        }
        .thinking-evidence {
            margin-top: 6px;
            padding: 6px 8px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        .thinking-evidence-head {
            font-size: 11px;
            color: #a5b4fc;
            margin-bottom: 2px;
        }
        .thinking-evidence-body {
            font-size: 11px;
            color: #94a3b8;
        }

        /* 欢迎消息 */
        .welcome-hint {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            padding: 40px 20px;
        }
        .welcome-hint-examples {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .example-chip {
            font-size: 12px;
            padding: 6px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .example-chip:hover {
            border-color: var(--border-focus);
            background: rgba(129, 140, 248, 0.1);
        }

        /* 输入区域 */
        .input-area {
            flex-shrink: 0;
            padding: 12px 0;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 6px 6px 16px;
            align-items: center;
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--border-focus);
        }
        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            line-height: 1.5;
            padding: 4px 0;
            outline: none;
        }
        .input-wrapper textarea::placeholder {
            color: #64748b;
        }
        .input-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .new-chat-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: border-color 0.2s, color 0.2s;
            flex-shrink: 0;
        }
        .new-chat-btn:hover {
            border-color: var(--border-focus);
            color: var(--text);
        }
        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: transform 0.15s, filter 0.15s;
            flex-shrink: 0;
        }
        .send-btn:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: scale(1.05);
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding: 0 4px;
        }
        .status {
            font-size: 12px;
            color: var(--muted);
        }
        .status.ok { color: var(--success); }
        .status.error { color: var(--error); }

        /* 底部链接 */
        .footer-links {
            text-align: center;
            font-size: 11px;
            padding: 8px 0;
        }
        .footer-links a {
            color: var(--muted);
            text-decoration: none;
            margin: 0 8px;
        }
        .footer-links a:hover {
            color: var(--accent);
        }

        /* 同步面板（折叠） */
        .sync-toggle {
            position: fixed;
            bottom: 80px;
            right: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, color 0.2s;
        }
        .sync-toggle:hover {
            border-color: var(--border-focus);
            color: var(--accent);
        }
        .sync-panel {
            position: fixed;
            bottom: 130px;
            right: 24px;
            width: 320px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            display: none;
            box-shadow: var(--shadow);
            max-height: 520px;
            overflow-y: auto;
        }
        .sync-panel.open {
            display: block;
        }
        .sync-panel h3 {
            margin: 0 0 12px;
            font-size: 14px;
            color: var(--text);
        }
        .sync-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sync-form input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            font-size: 13px;
        }
        .sync-form button {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }
        .sync-form button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .sync-form button.secondary {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .sync-form label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }
        .sync-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .sync-section:first-of-type {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }
        .sync-section-title {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .sync-btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .sync-btn-row button {
            flex: 1;
            min-width: 120px;
        }
        .sync-log {
            margin-top: 12px;
            background: #080c18;
            border-radius: 8px;
            padding: 8px;
            font-family: ui-monospace, Consolas, monospace;
            font-size: 10px;
            max-height: 120px;
            overflow-y: auto;
            color: #94a3b8;
            white-space: pre-wrap;
        }
        .sync-status {
            font-size: 11px;
            margin-top: 6px;
        }

        @media (max-width: 520px) {
            .wrap { padding: 0 12px 32px; }
            .message { max-width: 92%; }
            .sync-panel { width: calc(100vw - 32px); right: 16px; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header class="hero">
        <div class="hero-orb" aria-hidden="true">✦</div>
        <h1>企业智能助手</h1>
        <p>基于企业知识图谱与向量库</p>
    </header>

    <div id="chatContainer" class="chat-container">
        <div class="welcome-hint">
            <div>向我提问，例如：</div>
            <div class="welcome-hint-examples">
                <span class="example-chip" onclick="fillQuestion('戴先生是哪些主体的法定代表人')">戴先生是哪些主体的法定代表人</span>
                <span class="example-chip" onclick="fillQuestion('某公司有哪些证照')">某公司有哪些证照</span>
                <span class="example-chip" onclick="fillQuestion('周吴徐具体是哪些人')">周吴徐具体是哪些人</span>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="questionInput" rows="1" placeholder="输入问题，Enter 发送，Ctrl+Enter 换行…"></textarea>
            <div class="input-actions">
                <button class="new-chat-btn" id="newChatBtn" title="新对话">+</button>
                <button class="send-btn" id="sendBtn">↑</button>
            </div>
        </div>
        <div class="status-bar">
            <span id="statusText" class="status">就绪</span>
        </div>
    </div>

    <footer class="footer-links">
        <a href="/qa/assistant/runtime-summary" target="_blank">运行配置</a>
        <a href="/qa/learn/knowledge-sync/status" target="_blank">同步状态</a>
    </footer>
</div>

<button class="sync-toggle" id="syncToggleBtn" title="知识同步">📚</button>
<div class="sync-panel" id="syncPanel">
    <h3>同步企业知识</h3>
    <div class="sync-form">
        <div class="sync-section">
            <div class="sync-section-title">增量同步（EKSP）</div>
            <label for="syncSince">since（可选，如 2026-01-01 00:00:00；留空用配置/水位）</label>
            <input id="syncSince" type="text" placeholder="留空 = 上次同步时间或近 24 小时">
            <label for="syncCompanyIds">companyIds（可选，逗号分隔）</label>
            <input id="syncCompanyIds" type="text" placeholder="例：1001,1002">
            <div class="sync-btn-row">
                <button type="button" id="syncIncrementalBtn">增量同步</button>
                <button type="button" class="secondary" id="syncIncrementalIfChangedBtn">有变更才同步</button>
            </div>
            <div class="sync-btn-row">
                <button type="button" class="secondary" id="syncWatermarkProbeBtn">探测水位</button>
                <button type="button" class="secondary" id="syncRefreshStatusBtn">刷新状态</button>
            </div>
            <p style="margin:6px 0 0;font-size:10px;color:var(--muted);line-height:1.4">
                自动同步：配置 <code>knowledge-sync-incremental-scheduled-enabled=true</code> 后，按 poll-interval 轮询 company.updated_at，有变更才跑增量。
            </p>
        </div>
        <div class="sync-section">
            <div class="sync-section-title">全量同步（清空后重建）</div>
            <input id="syncMysqlDb" type="text" placeholder="数据库名（如 tdcomp）">
            <input id="syncMysqlHost" type="text" placeholder="主机" value="localhost">
            <input id="syncMysqlPort" type="number" placeholder="端口" value="3306">
            <input id="syncMysqlUser" type="text" placeholder="用户名" value="root">
            <input id="syncMysqlPass" type="password" placeholder="密码">
            <button type="button" id="syncFromMysqlBtn">开始全量同步</button>
        </div>
    </div>
    <div id="syncStatus" class="sync-status status"></div>
    <div id="syncLog" class="sync-log">尚未执行</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const chatContainer = document.getElementById("chatContainer");
    const questionInput = document.getElementById("questionInput");
    const sendBtn = document.getElementById("sendBtn");
    const newChatBtn = document.getElementById("newChatBtn");
    const statusText = document.getElementById("statusText");
    const syncToggleBtn = document.getElementById("syncToggleBtn");
    const syncPanel = document.getElementById("syncPanel");

    let qaConversationId = sessionStorage.getItem("qaConversationId") || null;
    let askAbortController = null;
    let thinkingBuffer = "";

    function escapeHtml(text) {
        return (text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function fillQuestion(text) {
        questionInput.value = text;
        questionInput.focus();
    }

    function autoResize() {
        questionInput.style.height = "auto";
        questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + "px";
    }

    questionInput.addEventListener("input", autoResize);

    questionInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.ctrlKey && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });

    /* ===== 消息渲染 ===== */
    function addMessage(role, content, thinkingHtml) {
        const div = document.createElement("div");
        div.className = "message " + role;

        const label = document.createElement("div");
        label.className = "message-label";
        label.textContent = role === "user" ? "你" : "助手";
        div.appendChild(label);

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        if (role === "assistant" && content === "") {
            bubble.innerHTML = '<span style="color:var(--muted)">正在分析…</span>';
        } else if (window.marked && typeof window.marked.parse === "function" && content) {
            bubble.innerHTML = window.marked.parse(content, {gfm: true, breaks: true});
        } else {
            bubble.textContent = content || "";
        }
        div.appendChild(bubble);

        if (role === "assistant" && thinkingHtml) {
            const toggle = document.createElement("div");
            toggle.className = "thinking-toggle";
            toggle.textContent = "查看思考过程";
            toggle.addEventListener("click", function() {
                toggle.classList.toggle("open");
                contentDiv.style.display = toggle.classList.contains("open") ? "block" : "none";
                toggle.textContent = toggle.classList.contains("open") ? "收起思考" : "查看思考过程";
            });

            const contentDiv = document.createElement("div");
            contentDiv.className = "thinking-content";
            contentDiv.style.display = "none";

            const inner = document.createElement("div");
            inner.className = "thinking-inner";
            inner.innerHTML = thinkingHtml;
            contentDiv.appendChild(inner);

            bubble.after(toggle);
            toggle.after(contentDiv);
        }

        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
    }

    function appendToLastAssistantMessage(content, thinkingHtml) {
        const messages = chatContainer.querySelectorAll(".message.assistant");
        if (messages.length === 0) return null;
        const last = messages[messages.length - 1];
        const bubble = last.querySelector(".message-bubble");
        if (window.marked && typeof window.marked.parse === "function" && content) {
            bubble.innerHTML = window.marked.parse(content, {gfm: true, breaks: true});
        } else {
            bubble.textContent = content || "";
        }
        // 如果有思考过程内容，更新或添加
        if (thinkingHtml) {
            let toggle = last.querySelector(".thinking-toggle");
            let contentDiv = last.querySelector(".thinking-content");
            if (!toggle) {
                toggle = document.createElement("div");
                toggle.className = "thinking-toggle";
                toggle.textContent = "查看思考过程";
                toggle.addEventListener("click", function() {
                    toggle.classList.toggle("open");
                    contentDiv.style.display = toggle.classList.contains("open") ? "block" : "none";
                    toggle.textContent = toggle.classList.contains("open") ? "收起思考" : "查看思考过程";
                });
                bubble.after(toggle);
                contentDiv = document.createElement("div");
                contentDiv.className = "thinking-content";
                contentDiv.style.display = "none";
                const inner = document.createElement("div");
                inner.className = "thinking-inner";
                inner.innerHTML = thinkingHtml;
                contentDiv.appendChild(inner);
                toggle.after(contentDiv);
            } else {
                const inner = contentDiv.querySelector(".thinking-inner");
                if (inner) inner.innerHTML = thinkingHtml;
            }
        }
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return last;
    }

    function updateThinkingInLastMessage(thinkingHtml) {
        const messages = chatContainer.querySelectorAll(".message.assistant");
        if (messages.length === 0) return;
        const last = messages[messages.length - 1];
        let toggle = last.querySelector(".thinking-toggle");
        let contentDiv = last.querySelector(".thinking-content");
        if (!toggle) {
            toggle = document.createElement("div");
            toggle.className = "thinking-toggle open";
            toggle.textContent = "收起思考";
            toggle.addEventListener("click", function() {
                toggle.classList.toggle("open");
                contentDiv.style.display = toggle.classList.contains("open") ? "block" : "none";
                toggle.textContent = toggle.classList.contains("open") ? "收起思考" : "查看思考过程";
            });
            const bubble = last.querySelector(".message-bubble");
            bubble.after(toggle);
            contentDiv = document.createElement("div");
            contentDiv.className = "thinking-content open";
            const inner = document.createElement("div");
            inner.className = "thinking-inner";
            inner.innerHTML = thinkingHtml;
            contentDiv.appendChild(inner);
            toggle.after(contentDiv);
        } else {
            const inner = contentDiv.querySelector(".thinking-inner");
            if (inner) inner.innerHTML = thinkingHtml;
        }
    }

    /* ===== 思考过程解析 ===== */
    const THINKING_PHASE_ORDER = [
        "start", "question", "context", "hint", "learning", "orchestrate", "clarify",
        "intent_wait", "intent_done", "intent", "learning_recall", "retrieval", "retrieval_done",
        "evidence", "audit", "decision", "generation", "model", "degrade", "result", "meta"
    ];

    function collectAnalysisSections(steps) {
        const sections = [];
        for (const step of steps) {
            const d = step.details;
            if (d && d.view === "analysis" && Array.isArray(d.sections)) {
                for (const sec of d.sections) {
                    if (sec && sec.title) sections.push(sec);
                }
            }
        }
        return sections;
    }

    function renderThinkingSections(sections) {
        let html = "";
        for (const sec of sections) {
            html += '<div class="thinking-section">';
            html += '<div class="thinking-section-title">' + escapeHtml(sec.title || "") + "</div>";
            for (const line of sec.lines || []) {
                if (line) html += '<div class="thinking-line">' + escapeHtml(String(line)) + "</div>";
            }
            for (const item of sec.items || []) {
                html += '<div class="thinking-evidence">'
                    + '<div class="thinking-evidence-head">' + escapeHtml(item.head || "") + "</div>"
                    + '<div class="thinking-evidence-body">' + escapeHtml(item.body || "") + "</div>"
                    + "</div>";
            }
            html += "</div>";
        }
        return html;
    }

    function renderThinkingTimeline(steps) {
        const phaseLabel = {
            start: "开始", question: "问题", context: "上下文", hint: "对象",
            learning: "学习", orchestrate: "调度", clarify: "澄清",
            intent_wait: "意图识别", intent_done: "意图", intent: "意图",
            recall: "记忆", learning_recall: "记忆",
            retrieval: "检索", retrieval_done: "检索完成", evidence: "证据",
            audit: "质检", decision: "决策", generation: "生成", model: "模型推理",
            degrade: "降级", result: "结果", meta: "摘要"
        };
        let html = "";
        for (const step of steps) {
            const label = phaseLabel[step.phase] || step.phase || "步骤";
            html += '<div class="thinking-section">';
            html += '<div class="thinking-section-title">' + escapeHtml(label) + "</div>";
            if (step.message) {
                html += '<div class="thinking-line">' + escapeHtml(step.message) + "</div>";
            }
            if (step.details) {
                for (const [key, val] of Object.entries(step.details)) {
                    if (val == null || val === "") continue;
                    let text = Array.isArray(val) ? val.join(", ") : (typeof val === "object" ? JSON.stringify(val) : String(val));
                    html += '<div class="thinking-line" style="color:var(--muted)">'
                        + escapeHtml(key) + " = " + escapeHtml(text) + "</div>";
                }
            }
            html += "</div>";
        }
        return html;
    }

    /* ===== SSE 处理 ===== */
    function parseSseData(raw) {
        if (raw == null || raw === "") return null;
        try { return JSON.parse(raw); } catch { return raw; }
    }

    function processSseBlock(block) {
        if (!block || !block.trim()) return null;
        let eventName = "message";
        const dataLines = [];
        for (const line of block.split("\n")) {
            if (line.startsWith("event:")) eventName = line.slice(6).trim();
            else if (line.startsWith("data:")) dataLines.push(line.slice(5).trimStart());
        }
        return {eventName, data: parseSseData(dataLines.join("\n"))};
    }

    let state = {answerBuffer: "", streamedDelta: false, lastEventAt: Date.now()};
    let thinkingSteps = [];

    function handleSseEvent(eventName, data) {
        if (eventName === "thinking") {
            if (!data || typeof data !== "object") return;
            if (data.phase === "model") {
                thinkingBuffer += data.message || "";
                updateThinkingInLastMessage(thinkingBuffer);
            } else if (data.message || (data.details && Object.keys(data.details).length)) {
                thinkingSteps.push({
                    phase: data.phase || "step",
                    message: data.message || "",
                    details: data.details || null,
                    timestamp: data.timestamp || new Date().toISOString()
                });
                const sections = collectAnalysisSections(thinkingSteps);
                if (sections.length > 0) {
                    updateThinkingInLastMessage(renderThinkingSections(sections));
                } else {
                    updateThinkingInLastMessage(renderThinkingTimeline(thinkingSteps) + (thinkingBuffer ? '<div class="thinking-section"><div class="thinking-section-title">模型推理</div><div class="thinking-line">' + escapeHtml(thinkingBuffer) + '</div></div>' : ""));
                }
            }
            state.lastEventAt = Date.now();
            return;
        }
        if (eventName === "delta") {
            const chunk = typeof data === "string" ? data : (data == null ? "" : String(data));
            if (chunk) {
                state.streamedDelta = true;
                state.answerBuffer += chunk;
                const bubble = chatContainer.querySelectorAll(".message.assistant");
                if (bubble.length > 0) {
                    const lastBubble = bubble[bubble.length - 1].querySelector(".message-bubble");
                    if (window.marked && typeof window.marked.parse === "function") {
                        lastBubble.innerHTML = window.marked.parse(state.answerBuffer, {gfm: true, breaks: true});
                    } else {
                        lastBubble.textContent = state.answerBuffer;
                    }
                }
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            state.lastEventAt = Date.now();
            return;
        }
        if (eventName === "meta") {
            if (data && data.conversationId) {
                qaConversationId = data.conversationId;
                sessionStorage.setItem("qaConversationId", qaConversationId);
            }
            state.lastEventAt = Date.now();
            return;
        }
        if (eventName === "final") {
            if (data && data.answer != null) {
                state.answerBuffer = String(data.answer);
            }
            if (data && data.conversationId) {
                qaConversationId = data.conversationId;
                sessionStorage.setItem("qaConversationId", qaConversationId);
            }
            state.lastEventAt = Date.now();
            return;
        }
        if (eventName === "qa_error") {
            throw new Error((data && data.message) ? data.message : "流式问答失败");
        }
    }

    async function consumeAskStream(question, scope, signal) {
        const payload = {question, scope};
        if (qaConversationId) payload.conversationId = qaConversationId;

        const resp = await fetch("/qa/ask/stream", {
            method: "POST",
            headers: {"Content-Type": "application/json; charset=utf-8", "Accept": "text/event-stream"},
            body: JSON.stringify(payload),
            signal
        });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        if (!resp.body) throw new Error("浏览器不支持流式响应");

        state = {answerBuffer: "", streamedDelta: false, lastEventAt: Date.now()};
        thinkingSteps = [];
        thinkingBuffer = "";

        addMessage("assistant", "", "");
        setStatus("思考中…");

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        const idleLimitMs = 180000;

        while (true) {
            if (Date.now() - state.lastEventAt > idleLimitMs) {
                throw new Error("超过 " + (idleLimitMs / 1000) + " 秒未收到响应，已中止");
            }
            const readPromise = reader.read();
            const timeoutPromise = new Promise((_, reject) =>
                setTimeout(() => reject(new Error("__read_timeout__")), Math.min(15000, idleLimitMs))
            );
            let done, value;
            try {
                ({done, value} = await Promise.race([readPromise, timeoutPromise]));
            } catch (e) {
                if (e.message === "__read_timeout__") continue;
                throw e;
            }
            if (done) break;
            buffer += decoder.decode(value, {stream: true});
            buffer = buffer.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
            const blocks = buffer.split("\n\n");
            buffer = blocks.pop() || "";
            for (const block of blocks) {
                const parsed = processSseBlock(block);
                if (parsed) handleSseEvent(parsed.eventName, parsed.data);
            }
        }

        if (buffer.trim()) {
            const parsed = processSseBlock(buffer);
            if (parsed) handleSseEvent(parsed.eventName, parsed.data);
        }

        const bubble = chatContainer.querySelectorAll(".message.assistant");
        if (bubble.length > 0) {
            const lastBubble = bubble[bubble.length - 1].querySelector(".message-bubble");
            if (window.marked && typeof window.marked.parse === "function") {
                lastBubble.innerHTML = window.marked.parse(state.answerBuffer || "", {gfm: true, breaks: true});
            } else {
                lastBubble.textContent = state.answerBuffer || "";
            }
        }
    }

    function setStatus(text, isError) {
        statusText.textContent = text;
        statusText.className = "status" + (text.includes("完成") ? " ok" : (isError || text.includes("失败") ? " error" : ""));
    }

    /* ===== 发送 ===== */
    sendBtn.addEventListener("click", async () => {
        const question = questionInput.value.trim();
        const scope = "enterprise";
        if (!question) return;

        if (askAbortController) {
            askAbortController.abort();
        }
        askAbortController = new AbortController();
        const signal = askAbortController.signal;

        sendBtn.disabled = true;
        setStatus("连接中…");

        addMessage("user", question, null);

        try {
            await consumeAskStream(question, scope, signal);
            setStatus("完成");
        } catch (e) {
            if (e.name === "AbortError") {
                setStatus("已取消");
                return;
            }
            const messages = chatContainer.querySelectorAll(".message.assistant");
            if (messages.length > 0) {
                const lastBubble = messages[messages.length - 1].querySelector(".message-bubble");
                lastBubble.innerHTML = '<span style="color:var(--error)">错误：' + escapeHtml(e.message) + '</span>';
            }
            setStatus("失败", true);
        } finally {
            sendBtn.disabled = false;
            askAbortController = null;
            questionInput.value = "";
            autoResize();
        }
    });

    newChatBtn.addEventListener("click", () => {
        qaConversationId = null;
        sessionStorage.removeItem("qaConversationId");
        chatContainer.innerHTML = '<div class="welcome-hint"><div>向我提问，例如：</div><div class="welcome-hint-examples"><span class="example-chip" onclick="fillQuestion(\'戴先生是哪些主体的法定代表人\')">戴先生是哪些主体的法定代表人</span><span class="example-chip" onclick="fillQuestion(\'某公司有哪些证照\')">某公司有哪些证照</span><span class="example-chip" onclick="fillQuestion(\'周吴徐具体是哪些人\')">周吴徐具体是哪些人</span></div></div>';
        setStatus("已开启新对话");
    });

    /* ===== 同步面板 ===== */
    syncToggleBtn.addEventListener("click", () => {
        syncPanel.classList.toggle("open");
    });

    const syncIncrementalBtn = document.getElementById("syncIncrementalBtn");
    const syncIncrementalIfChangedBtn = document.getElementById("syncIncrementalIfChangedBtn");
    const syncWatermarkProbeBtn = document.getElementById("syncWatermarkProbeBtn");
    const syncFromMysqlBtn = document.getElementById("syncFromMysqlBtn");
    const syncRefreshStatusBtn = document.getElementById("syncRefreshStatusBtn");

    function setSyncButtonsDisabled(disabled) {
        syncIncrementalBtn.disabled = disabled;
        syncIncrementalIfChangedBtn.disabled = disabled;
        syncWatermarkProbeBtn.disabled = disabled;
        syncFromMysqlBtn.disabled = disabled;
        syncRefreshStatusBtn.disabled = disabled;
    }

    function appendSyncLog(text) {
        const log = document.getElementById("syncLog");
        log.textContent = text;
    }

    syncIncrementalBtn.addEventListener("click", async () => {
        const since = document.getElementById("syncSince").value.trim();
        const companyIds = document.getElementById("syncCompanyIds").value.trim();
        const hint = since ? "since=" + since : "默认水位/近24小时";
        if (!confirm("执行增量同步（" + hint + "）？\n将调用 Python 拉取变更并 upsert Neo4j/Qdrant，可能需数分钟。")) return;
        setSyncButtonsDisabled(true);
        setSyncStatus("增量同步中…", null);
        appendSyncLog("请求中…");
        try {
            const body = { async: false };
            if (since) body.since = since;
            if (companyIds) body.companyIds = companyIds;
            const resp = await fetch("/qa/learn/knowledge-sync/incremental", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            });
            const data = await resp.json();
            const lines = [];
            if (data.batchId) lines.push("batchId: " + data.batchId);
            if (data.domain) lines.push("domain: " + data.domain);
            if (data.since) lines.push("since: " + data.since);
            if (data.entitiesRecorded != null) lines.push("entitiesRecorded: " + data.entitiesRecorded);
            if (data.entityStateTotal != null) lines.push("entityStateTotal: " + data.entityStateTotal);
            if (Array.isArray(data.logs)) lines.push("", "--- logs ---", ...data.logs);
            if (data.message) lines.push("", data.message);
            appendSyncLog(lines.join("\n") || JSON.stringify(data, null, 2));
            if (data.ok) {
                setSyncStatus("增量同步完成", true);
            } else {
                setSyncStatus(data.message || "增量同步失败", false);
            }
        } catch (e) {
            setSyncStatus(e.message, false);
            appendSyncLog("错误: " + e.message);
        } finally {
            setSyncButtonsDisabled(false);
        }
    });

    syncWatermarkProbeBtn.addEventListener("click", async () => {
        setSyncButtonsDisabled(true);
        setSyncStatus("探测中…", null);
        try {
            const resp = await fetch("/qa/learn/knowledge-sync/watermark-probe");
            const data = await resp.json();
            appendSyncLog(formatProbeOrStatus(data));
            setSyncStatus(data.changed ? ("有 " + data.changedCount + " 条变更") : (data.message || "无变更"),
                data.changed ? null : true);
        } catch (e) {
            setSyncStatus(e.message, false);
        } finally {
            setSyncButtonsDisabled(false);
        }
    });

    syncIncrementalIfChangedBtn.addEventListener("click", async () => {
        setSyncButtonsDisabled(true);
        setSyncStatus("检查变更…", null);
        try {
            const resp = await fetch("/qa/learn/knowledge-sync/incremental-if-changed", { method: "POST" });
            const data = await resp.json();
            appendSyncLog(formatIncrementalResult(data));
            if (data.skipped) setSyncStatus(data.message || "已跳过", true);
            else if (data.ok) setSyncStatus("增量同步完成", true);
            else setSyncStatus(data.message || "失败", false);
        } catch (e) {
            setSyncStatus(e.message, false);
        } finally {
            setSyncButtonsDisabled(false);
        }
    });

    syncRefreshStatusBtn.addEventListener("click", () => refreshSyncStatus(true));

    function formatProbeOrStatus(data) {
        const lines = [];
        if (data.knowledgeSyncAutoEnabled != null) {
            lines.push("autoEnabled: " + data.knowledgeSyncAutoEnabled);
            lines.push("watchOnly: " + data.knowledgeSyncWatermarkWatchOnly);
            lines.push("pollIntervalMs: " + data.knowledgeSyncPollIntervalMs);
        }
        if (data.currentIncrementalSince) lines.push("since: " + data.currentIncrementalSince);
        if (data.changedCount != null) lines.push("changedCount: " + data.changedCount);
        if (data.maxUpdatedAt) lines.push("maxUpdatedAt: " + data.maxUpdatedAt);
        if (data.anchorTable) lines.push("anchor: " + data.anchorTable);
        if (data.lastWatermarkProbe) {
            lines.push("", "--- lastWatermarkProbe ---");
            lines.push(JSON.stringify(data.lastWatermarkProbe, null, 2));
        }
        if (data.message) lines.push(data.message);
        return lines.length ? lines.join("\n") : JSON.stringify(data, null, 2);
    }

    function formatIncrementalResult(data) {
        return formatProbeOrStatus(data);
    }

    document.getElementById("syncFromMysqlBtn").addEventListener("click", async () => {
        const db = document.getElementById("syncMysqlDb").value.trim();
        if (!db) {
            alert("请填写数据库名");
            return;
        }
        if (!confirm("将全量同步「" + db + "」，是否继续？")) return;
        setSyncButtonsDisabled(true);
        setSyncStatus("启动中…", null);
        try {
            const resp = await fetch("/qa/learn/knowledge-sync/from-mysql", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    host: document.getElementById("syncMysqlHost").value || "localhost",
                    port: parseInt(document.getElementById("syncMysqlPort").value) || 3306,
                    database: db,
                    username: document.getElementById("syncMysqlUser").value || "root",
                    password: document.getElementById("syncMysqlPass").value || ""
                })
            });
            const data = await resp.json();
            if (!data.ok) throw new Error(data.message || "启动失败");
            setSyncStatus("同步中…", null);
            startSyncPoll();
        } catch (e) {
            setSyncStatus(e.message, false);
        } finally {
            setSyncButtonsDisabled(false);
        }
    });

    let syncPollTimer = null;
    function startSyncPoll() {
        if (syncPollTimer) clearInterval(syncPollTimer);
        syncPollTimer = setInterval(refreshSyncStatus, 2000);
    }

    async function refreshSyncStatus(manual) {
        try {
            const resp = await fetch("/qa/learn/knowledge-sync/status");
            const data = await resp.json();
            const extra = [];
            if (data.entityStateCount != null) extra.push("entityStateCount: " + data.entityStateCount);
            if (data.qdrant) extra.push("qdrant: " + JSON.stringify(data.qdrant));
            if (data.neo4j) extra.push("neo4j: " + JSON.stringify(data.neo4j));
            if (data.job) {
                extra.push("job: " + data.job.type + " / " + data.job.status);
                if (data.job.logs) extra.push("", ...data.job.logs);
                if (data.job.status === "running") setSyncStatus("同步中…", null);
                else if (data.job.status === "success") { setSyncStatus("同步完成", true); clearInterval(syncPollTimer); }
                else if (data.job.status === "failed") { setSyncStatus("同步失败", false); clearInterval(syncPollTimer); }
            } else if (manual) {
                setSyncStatus("已刷新状态", true);
            }
            const logText = formatProbeOrStatus(data) + (extra.length ? "\n" + extra.join("\n") : "");
            appendSyncLog(logText);
        } catch (e) {
            setSyncStatus(e.message, false);
        }
    }

    function setSyncStatus(text, ok) {
        const el = document.getElementById("syncStatus");
        el.textContent = text;
        el.className = "sync-status status" + (ok === true ? " ok" : (ok === false ? " error" : ""));
    }
</script>
</body>
</html>
