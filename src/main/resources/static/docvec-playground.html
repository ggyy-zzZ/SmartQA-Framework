<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocVec 实验问答</title>
    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a2332;
            --surface2: #243044;
            --border: rgba(148, 163, 184, 0.15);
            --primary: #34d399;
            --primary-dim: #059669;
            --sql: #38bdf8;
            --rag: #a78bfa;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --err: #fb7185;
            --radius: 12px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
            background: radial-gradient(ellipse at top, #1e293b 0%, var(--bg) 55%);
            color: var(--text);
        }
        .wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 16px 20px 32px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            text-align: center;
            padding: 12px 0 8px;
        }
        header h1 { margin: 0 0 6px; font-size: 22px; font-weight: 600; }
        header p { margin: 0; color: var(--muted); font-size: 13px; }
        .badge-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
        }
        .badge.ok { color: var(--primary); border-color: rgba(52, 211, 153, 0.35); }
        .samples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0 4px;
        }
        .sample-btn {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
        }
        .sample-btn:hover { border-color: var(--primary); color: var(--primary); }
        .chat {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 16px 0;
            min-height: 280px;
        }
        .msg { max-width: 92%; animation: fade 0.25s ease; }
        @keyframes fade { from { opacity: 0; transform: translateY(6px); } }
        .msg.user { align-self: flex-end; }
        .msg.bot { align-self: flex-start; width: 100%; max-width: 100%; }
        .bubble {
            padding: 12px 14px;
            border-radius: var(--radius);
            line-height: 1.55;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg.user .bubble {
            background: linear-gradient(135deg, var(--primary-dim), var(--primary));
            color: #042f1a;
            border-bottom-right-radius: 4px;
        }
        .msg.bot .bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg.bot .bubble.md {
            white-space: normal;
        }
        .msg.bot .bubble.md > :first-child { margin-top: 0; }
        .msg.bot .bubble.md > :last-child { margin-bottom: 0; }
        .msg.bot .bubble.md p { margin: 0.5em 0; }
        .msg.bot .bubble.md h1,
        .msg.bot .bubble.md h2,
        .msg.bot .bubble.md h3 {
            margin: 0.85em 0 0.45em;
            font-weight: 600;
            line-height: 1.35;
        }
        .msg.bot .bubble.md h1 { font-size: 1.15em; }
        .msg.bot .bubble.md h2 { font-size: 1.05em; }
        .msg.bot .bubble.md h3 { font-size: 1em; color: var(--text); }
        .msg.bot .bubble.md ul,
        .msg.bot .bubble.md ol {
            margin: 0.45em 0;
            padding-left: 1.35em;
        }
        .msg.bot .bubble.md li { margin: 0.2em 0; }
        .msg.bot .bubble.md hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 0.85em 0;
        }
        .msg.bot .bubble.md blockquote {
            margin: 0.5em 0;
            padding: 0.35em 0.75em;
            border-left: 3px solid rgba(52, 211, 153, 0.45);
            color: var(--muted);
            background: rgba(15, 20, 25, 0.35);
            border-radius: 0 6px 6px 0;
        }
        .msg.bot .bubble.md code {
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.92em;
            background: rgba(15, 20, 25, 0.65);
            padding: 0.1em 0.35em;
            border-radius: 4px;
        }
        .msg.bot .bubble.md pre {
            margin: 0.55em 0;
            padding: 10px 12px;
            background: rgba(15, 20, 25, 0.75);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.45;
        }
        .msg.bot .bubble.md pre code {
            background: none;
            padding: 0;
        }
        .msg.bot .bubble.md table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.65em 0;
            font-size: 13px;
        }
        .msg.bot .bubble.md th,
        .msg.bot .bubble.md td {
            border: 1px solid var(--border);
            padding: 6px 8px;
            text-align: left;
            vertical-align: top;
        }
        .msg.bot .bubble.md th {
            background: var(--surface2);
            font-weight: 600;
        }
        .msg.bot .bubble.md tr:nth-child(even) td {
            background: rgba(36, 48, 68, 0.35);
        }
        .msg.bot .bubble.md strong { color: #f8fafc; font-weight: 600; }
        .msg.bot .bubble.md a { color: var(--primary); }
        .meta {
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .route-tag {
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 11px;
        }
        .route-tag.sql { background: rgba(56, 189, 248, 0.15); color: var(--sql); }
        .route-tag.rag { background: rgba(167, 139, 250, 0.15); color: var(--rag); }
        .evidence-box {
            margin-top: 10px;
            padding: 10px;
            background: var(--surface2);
            border-radius: 8px;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .evidence-box summary { cursor: pointer; color: var(--muted); }
        .evidence-item { padding: 6px 0; border-bottom: 1px solid var(--border); }
        .evidence-item:last-child { border-bottom: none; }
        .composer {
            position: sticky;
            bottom: 0;
            background: linear-gradient(transparent, var(--bg) 20%);
            padding-top: 12px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        textarea {
            flex: 1;
            min-height: 48px;
            max-height: 120px;
            resize: vertical;
            padding: 12px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font: inherit;
            font-size: 14px;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        button.send {
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius);
            background: var(--primary);
            color: #042f1a;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        button.send:disabled { opacity: 0.5; cursor: not-allowed; }
        details.adv {
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
        }
        details.adv input {
            width: 64px;
            padding: 4px 8px;
            margin-left: 6px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
        }
        .loading { color: var(--muted); font-size: 13px; padding: 8px 0; }
        .err { color: var(--err); }
        footer {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            margin-top: 12px;
        }
        footer a { color: var(--primary); }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>DocVec 实验问答</h1>
        <p>视图 SQL（列表/COUNT/证照）+ Doc-RAG 向量（单公司详情）· LLM 路由 · 支持多轮</p>
        <div class="badge-row" id="statusBadges">
            <span class="badge">检测服务中…</span>
        </div>
        <div class="samples">
            <button type="button" class="sample-btn" data-q="戴科彬还是哪些主体的法人">法人列表 SQL</button>
            <button type="button" class="sample-btn" data-q="北京有哪些公司">地区列表 SQL</button>
            <button type="button" class="sample-btn" data-q="存续的公司有多少家">数量统计 SQL</button>
            <button type="button" class="sample-btn" data-q="万仕道（北京）管理咨询有限责任公司有哪些证照？">单公司证照 RAG</button>
            <button type="button" class="sample-btn" data-q="现在有 人力资源服务许可证的主体有哪些">证照主体列表 SQL</button>
            <button type="button" class="sample-btn" data-q="猎聘凯普斯的法定代表人是谁？">法定代表人 RAG</button>
            <button type="button" class="sample-btn" id="newSessionBtn" style="border-color:var(--sql);color:var(--sql)">新会话</button>
        </div>
    </header>

    <div class="chat" id="chat"></div>

    <div class="composer">
        <div class="input-row">
            <textarea id="question" placeholder="输入问题，Enter 发送，Shift+Enter 换行" rows="2"></textarea>
            <button type="button" class="send" id="sendBtn">发送</button>
        </div>
        <details class="adv">
            <summary>高级参数（仅 RAG 通路）</summary>
            <label>vectorTopK <input type="number" id="topK" min="1" max="100" placeholder="12"></label>
            <label style="margin-left:12px">rerankTopK <input type="number" id="rerankTopK" min="1" max="50" placeholder="6"></label>
        </details>
    </div>

    <footer>
        API: <code>POST /qa/docvec/ask</code> ·
        <a href="/qa-playground.html">主链路 Playground</a>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const chatEl = document.getElementById('chat');
    const questionEl = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');
    const statusBadges = document.getElementById('statusBadges');
    let docvecConversationId = null;

    function applyConversationId(data) {
        if (data && data.conversationId) {
            docvecConversationId = data.conversationId;
        }
    }

    function appendMsg(role, html) {
        const div = document.createElement('div');
        div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
        div.innerHTML = html;
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
        return div;
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function renderMarkdown(text) {
        const raw = text || '(无回答)';
        if (window.marked && typeof window.marked.parse === 'function') {
            return window.marked.parse(raw, { gfm: true, breaks: true });
        }
        return escapeHtml(raw);
    }

    function routeClass(route) {
        if (!route) return '';
        return route.includes('sql') ? 'sql' : 'rag';
    }

    function formatBotResponse(data) {
        const route = data.route || 'unknown';
        const mode = (data.debug && data.debug.retrievalMode) || (route.includes('sql') ? 'sql' : 'rag');
        let html = '<div class="bubble md">' + renderMarkdown(data.answer) + '</div>';
        html += '<div class="meta">';
        html += '<span class="route-tag ' + routeClass(route) + '">' + escapeHtml(route) + '</span>';
        html += '<span>证据 ' + (data.evidenceCount ?? 0) + ' 条</span>';
        html += '<span>confidence ' + (data.confidence != null ? data.confidence.toFixed(2) : '-') + '</span>';
        if (data.canAnswer === false) html += '<span class="err">canAnswer=false</span>';
        if (data.debug && data.debug.followUpApplied) html += '<span>多轮</span>';
        if (data.debug && data.debug.queryType) html += '<span>' + escapeHtml(data.debug.queryType) + '</span>';
        html += '</div>';
        if (data.evidence && data.evidence.length) {
            html += '<details class="evidence-box"><summary>证据预览 (' + data.evidence.length + ')</summary>';
            data.evidence.slice(0, 8).forEach(function (ev, i) {
                html += '<div class="evidence-item"><strong>' + (i + 1) + '. ' + escapeHtml(ev.companyName || ev.docId || '') + '</strong>';
                html += '<div style="color:var(--muted);margin-top:2px">' + escapeHtml(ev.preview || '') + '</div></div>';
            });
            if (data.evidence.length > 8) {
                html += '<div style="color:var(--muted);padding-top:6px">… 另有 ' + (data.evidence.length - 8) + ' 条</div>';
            }
            html += '</details>';
        }
        if (data.debug) {
            html += '<details class="evidence-box" style="margin-top:6px"><summary>debug</summary><pre style="margin:0;font-size:11px;white-space:pre-wrap">'
                + escapeHtml(JSON.stringify(data.debug, null, 2)) + '</pre></details>';
        }
        return html;
    }

    async function loadStatus() {
        try {
            const resp = await fetch('/qa/docvec/status');
            const data = await resp.json();
            statusBadges.innerHTML = '';
            const ok = data.enabled !== false;
            statusBadges.innerHTML =
                '<span class="badge ' + (ok ? 'ok' : '') + '">' + (ok ? '● 已启用' : '○ 未启用') + '</span>' +
                '<span class="badge">collection: ' + escapeHtml(data.collection || '-') + '</span>' +
                '<span class="badge">topK ' + (data.vectorTopK || '-') + ' / rerank ' + (data.rerankTopK || '-') + '</span>';
        } catch (e) {
            statusBadges.innerHTML = '<span class="badge err">服务未就绪</span>';
        }
    }

    async function sendQuestion() {
        const question = questionEl.value.trim();
        if (!question) return;

        appendMsg('user', '<div class="bubble">' + escapeHtml(question) + '</div>');
        questionEl.value = '';
        sendBtn.disabled = true;

        const loadingEl = appendMsg('bot', '<div class="loading">思考中…</div>');

        const body = { question: question };
        if (docvecConversationId) body.conversationId = docvecConversationId;
        const topK = document.getElementById('topK').value;
        const rerankTopK = document.getElementById('rerankTopK').value;
        if (topK) body.topK = parseInt(topK, 10);
        if (rerankTopK) body.rerankTopK = parseInt(rerankTopK, 10);

        try {
            const resp = await fetch('/qa/docvec/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: JSON.stringify(body)
            });
            const text = await resp.text();
            let data;
            try { data = JSON.parse(text); } catch (_) { data = null; }
            if (!resp.ok) {
                loadingEl.innerHTML = '<div class="bubble err">HTTP ' + resp.status + ': ' + escapeHtml(data?.message || text.slice(0, 200)) + '</div>';
                return;
            }
            loadingEl.className = 'msg bot';
            loadingEl.innerHTML = formatBotResponse(data);
            applyConversationId(data);
        } catch (e) {
            loadingEl.innerHTML = '<div class="bubble err">请求失败: ' + escapeHtml(e.message) + '</div>';
        } finally {
            sendBtn.disabled = false;
            questionEl.focus();
        }
    }

    sendBtn.addEventListener('click', sendQuestion);
    questionEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendQuestion();
        }
    });
    document.querySelectorAll('.sample-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
            questionEl.value = btn.getAttribute('data-q') || '';
            questionEl.focus();
        });
    });

    document.getElementById('newSessionBtn').addEventListener('click', function () {
        docvecConversationId = null;
        chatEl.innerHTML = '';
        appendMsg('bot', '<div class="bubble" style="color:var(--muted)">已开始新会话（上下文已清空）</div>');
        questionEl.focus();
    });

    loadStatus();
    questionEl.focus();
</script>
</body>
</html>
